<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AstraSplit - Premium Trip Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #EFF6FF 0%, #EEF2FF 50%, #F8FAFC 100%);
            -webkit-font-smoothing: antialiased;
            color: #1e293b;
            overflow-x: hidden;
            min-height: 100vh;
        }

        h1, h2, h3, .font-poppins {
            font-family: 'Poppins', sans-serif;
        }
        
        /* Ambient Glow Backgrounds - Adjusted for Light Theme */
        .ambient-orb-1 {
            position: fixed; top: -10%; left: -10%; width: 300px; height: 300px;
            background: #2563EB; /* Primary Blue */
            border-radius: 50%; filter: blur(120px);
            opacity: 0.15; z-index: -1; animation: pulseOrb 8s infinite alternate;
        }
        .ambient-orb-2 {
            position: fixed; bottom: -10%; right: -10%; width: 300px; height: 300px;
            background: #4F46E5; /* Soft Indigo */
            border-radius: 50%; filter: blur(120px);
            opacity: 0.15; z-index: -1; animation: pulseOrb 10s infinite alternate-reverse;
        }

        @keyframes pulseOrb {
            0% { transform: scale(1) translate(0, 0); }
            100% { transform: scale(1.2) translate(20px, 20px); }
        }
        
        /* Clean Glass Panel */
        .glass-panel {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            box-shadow: 0 8px 32px 0 rgba(37, 99, 235, 0.05); /* Soft Blue Shadow */
        }

        .expense-card-enter {
            animation: slideDown 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-15px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Light Mode Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        /* Premium Toast */
        #toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100%);
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px);
            border: 1px solid #16A34A; color: #16A34A; /* Success Green */
            padding: 12px 24px; border-radius: 50px; font-weight: 500; font-size: 14px;
            box-shadow: 0 10px 25px -5px rgba(22, 163, 74, 0.15);
            opacity: 0; visibility: hidden;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 100; display: flex; align-items: center; gap: 8px;
        }

        #toast.show {
            transform: translateX(-50%) translateY(0); opacity: 1; visibility: visible;
        }

        /* Input Focus Glows - Light Mode */
        .input-focus-ring { transition: all 0.3s ease; }
        .input-focus-ring:focus-within {
            border-color: #2563EB;
            box-shadow: 0 0 15px rgba(37, 99, 235, 0.1);
            background: rgba(255, 255, 255, 0.9);
        }
        
        /* Dropdown styling for light mode */
        select option { background-color: #ffffff; color: #1e293b; }

        /* Custom text gradient */
        .text-gradient {
            background: linear-gradient(135deg, #2563EB 0%, #4F46E5 100%);
            -webkit-background-clip: text; 
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="min-h-screen pb-24 flex flex-col items-center p-4">

    <div class="ambient-orb-1"></div>
    <div class="ambient-orb-2"></div>

    <header class="w-full max-w-md py-6 text-center z-10 relative">
        <div class="inline-flex items-center justify-center gap-2 px-4 py-1.5 rounded-full bg-[#2563EB]/10 border border-[#2563EB]/20 text-[#2563EB] font-semibold tracking-widest text-xs mb-3">
            ASTRASPLIT PRO
        </div>
        <h1 class="text-3xl font-bold text-slate-800 tracking-tight">Trip <span class="text-gradient">Manager</span></h1>
    </header>

    <main class="w-full max-w-md space-y-6 z-10 relative">
        
        <section class="glass-panel rounded-3xl p-6">
            <h2 class="text-[14px] font-semibold text-slate-600 mb-4 uppercase tracking-widest flex items-center justify-between w-full">
                <div class="flex items-center gap-2">
                    New Expense
                </div>
                <button type="button" onclick="openCalc()" class="flex items-center gap-1.5 bg-[#4F46E5]/10 hover:bg-[#4F46E5]/20 border border-[#4F46E5]/20 text-[#4F46E5] px-3 py-1.5 rounded-xl text-xs font-semibold transition-all shadow-sm active:scale-95">
                    Calc
                </button>
            </h2>
            <form id="add-form" class="space-y-4">
                <div class="bg-white/50 border border-slate-200 rounded-2xl flex items-center px-3 input-focus-ring">
                    <input type="text" id="desc" required placeholder="What was it? (e.g. Snacks)" class="w-full bg-transparent py-3.5 px-3 text-sm outline-none text-slate-800 placeholder-slate-400">
                </div>
                
                <div class="flex gap-3">
                    <div class="bg-white/50 border border-slate-200 rounded-2xl flex items-center px-3 input-focus-ring w-1/2">
                        <span class="text-lg font-bold text-[#2563EB]">₹</span>
                        <input type="number" id="amt" required min="1" placeholder="Amount" class="w-full bg-transparent py-3.5 px-2 text-sm outline-none text-slate-800 placeholder-slate-400">
                    </div>
                    
                    <div class="bg-white/50 border border-slate-200 rounded-2xl flex items-center px-2 input-focus-ring w-1/2">
                        <select id="payer" class="w-full bg-transparent py-3.5 px-2 text-sm outline-none text-slate-700 font-medium cursor-pointer">
                            <option value="Omm">Omm</option>
                            <option value="Satyapragnya">Satya</option>
                            <option value="Biswaranjan">Biswa</option>
                            <option value="Neeraj">Neeraj</option>
                        </select>
                    </div>
                </div>
                
                <button type="submit" class="w-full bg-[#2563EB] hover:bg-[#1D4ED8] text-white font-semibold py-4 rounded-2xl transition-all shadow-[0_4px_15px_rgba(37,99,235,0.25)] hover:shadow-[0_6px_20px_rgba(37,99,235,0.3)] active:scale-[0.98] tracking-wide mt-2">
                    Add to Bill
                </button>
            </form>
        </section>

        <section class="glass-panel rounded-3xl p-6 border-t border-slate-200 relative overflow-hidden">
            <div class="absolute top-0 left-0 right-0 h-[1px] bg-gradient-to-r from-transparent via-[#2563EB] to-transparent opacity-20"></div>
            
            <div class="flex justify-between items-end mb-5">
                <h2 class="text-[14px] font-semibold text-slate-600 uppercase tracking-widest flex items-center gap-2">
                    Settlements
                </h2>
                <div class="text-right">
                    <p class="text-[10px] text-slate-500 font-medium uppercase tracking-wider mb-0.5">Total Spent</p>
                    <p class="text-2xl font-bold text-[#2563EB]" id="ui-total">₹0</p>
                </div>
            </div>

            <!-- Settlement List -->
            <div id="ui-settlements" class="bg-slate-100/50 rounded-2xl p-4 border border-slate-200 space-y-3 mb-6">
                <p class="text-center text-sm text-slate-400 py-3 font-light">Awaiting first transaction...</p>
            </div>
            
            <!-- Expense History -->
            <div>
                <h3 class="text-[11px] font-semibold text-slate-400 uppercase tracking-widest mb-3 flex items-center gap-2">
                    <span class="w-full h-px bg-slate-200"></span>
                    History
                    <span class="w-full h-px bg-slate-200"></span>
                </h3>
                <div id="ui-history" class="space-y-2 max-h-40 overflow-y-auto pr-2">
                    <!-- Populated dynamically -->
                </div>
            </div>
        </section>
    </main>

    <div id="calc-modal" class="fixed inset-0 bg-[#F8FAFC]/80 backdrop-blur-md hidden z-50 flex items-center justify-center p-4 transition-opacity duration-300 opacity-0">
        <div class="glass-panel p-5 rounded-3xl w-full max-w-[320px] transform scale-95 transition-transform duration-300 border border-slate-200 shadow-xl" id="calc-container">
            <div class="flex justify-between items-center mb-5">
                <h3 class="text-xs font-semibold text-slate-500 uppercase tracking-widest flex items-center gap-2">Calculator</h3>
                <button type="button" onclick="closeCalc()" class="text-slate-400 hover:text-slate-700 bg-slate-100 hover:bg-slate-200 p-2 rounded-full transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
                </button>
            </div>
            
            <!-- Calc Screen -->
            <div class="bg-white border border-slate-200 p-4 rounded-2xl mb-5 text-right text-3xl font-medium text-[#2563EB] break-all overflow-hidden shadow-inner flex items-center justify-end min-h-[75px] tracking-wider" id="calc-screen">0</div>
            
            <!-- Calc Keys -->
            <div class="grid grid-cols-4 gap-3 mb-5">
                <button type="button" class="bg-[#DC2626]/10 border border-[#DC2626]/20 text-[#DC2626] font-medium p-3 rounded-2xl shadow-sm active:scale-95 transition-all text-lg hover:bg-[#DC2626]/20" onclick="calcAction('C')">C</button>
                <button type="button" class="bg-white border border-slate-200 text-slate-600 font-medium p-3 rounded-2xl shadow-sm active:scale-95 transition-all text-lg hover:bg-slate-50" onclick="calcAction('del')">⌫</button>
                <button type="button" class="bg-[#4F46E5]/10 border border-[#4F46E5]/20 text-[#4F46E5] font-medium p-3 rounded-2xl shadow-sm active:scale-95 transition-all text-2xl leading-none hover:bg-[#4F46E5]/20" onclick="calcAction('÷')">÷</button>
                <button type="button" class="bg-[#4F46E5]/10 border border-[#4F46E5]/20 text-[#4F46E5] font-medium p-3 rounded-2xl shadow-sm active:scale-95 transition-all text-2xl leading-none hover:bg-[#4F46E5]/20" onclick="calcAction('×')">×</button>
                
                <button type="button" class="bg-white border border-slate-200 text-slate-700 font-medium p-3 rounded-2xl shadow-sm active:scale-95 transition-all text-xl hover:bg-slate-50" onclick="calcAction('7')">7</button>
                <button type="button" class="bg-white border border-slate-200 text-slate-700 font-medium p-3 rounded-2xl shadow-sm active:scale-95 transition-all text-xl hover:bg-slate-50" onclick="calcAction('8')">8</button>
                <button type="button" class="bg-white border border-slate-200 text-slate-700 font-medium p-3 rounded-2xl shadow-sm active:scale-95 transition-all text-xl hover:bg-slate-50" onclick="calcAction('9')">9</button>
                <button type="button" class="bg-[#4F46E5]/10 border border-[#4F46E5]/20 text-[#4F46E5] font-medium p-3 rounded-2xl shadow-sm active:scale-95 transition-all text-2xl leading-none hover:bg-[#4F46E5]/20" onclick="calcAction('-')">-</button>
                
                <button type="button" class="bg-white border border-slate-200 text-slate-700 font-medium p-3 rounded-2xl shadow-sm active:scale-95 transition-all text-xl hover:bg-slate-50" onclick="calcAction('4')">4</button>
                <button type="button" class="bg-white border border-slate-200 text-slate-700 font-medium p-3 rounded-2xl shadow-sm active:scale-95 transition-all text-xl hover:bg-slate-50" onclick="calcAction('5')">5</button>
                <button type="button" class="bg-white border border-slate-200 text-slate-700 font-medium p-3 rounded-2xl shadow-sm active:scale-95 transition-all text-xl hover:bg-slate-50" onclick="calcAction('6')">6</button>
                <button type="button" class="bg-[#4F46E5]/10 border border-[#4F46E5]/20 text-[#4F46E5] font-medium p-3 rounded-2xl shadow-sm active:scale-95 transition-all text-2xl leading-none hover:bg-[#4F46E5]/20" onclick="calcAction('+')">+</button>
                
                <button type="button" class="bg-white border border-slate-200 text-slate-700 font-medium p-3 rounded-2xl shadow-sm active:scale-95 transition-all text-xl hover:bg-slate-50" onclick="calcAction('1')">1</button>
                <button type="button" class="bg-white border border-slate-200 text-slate-700 font-medium p-3 rounded-2xl shadow-sm active:scale-95 transition-all text-xl hover:bg-slate-50" onclick="calcAction('2')">2</button>
                <button type="button" class="bg-white border border-slate-200 text-slate-700 font-medium p-3 rounded-2xl shadow-sm active:scale-95 transition-all text-xl hover:bg-slate-50" onclick="calcAction('3')">3</button>
                <button type="button" class="bg-[#2563EB] text-white font-medium p-3 rounded-2xl shadow-[0_4px_10px_rgba(37,99,235,0.3)] active:scale-95 transition-all text-2xl row-span-2 hover:bg-[#1D4ED8]" onclick="calcAction('=')">=</button>
                
                <button type="button" class="bg-white border border-slate-200 text-slate-700 font-medium p-3 rounded-2xl shadow-sm active:scale-95 transition-all text-xl col-span-2 hover:bg-slate-50" onclick="calcAction('0')">0</button>
                <button type="button" class="bg-white border border-slate-200 text-slate-700 font-medium p-3 rounded-2xl shadow-sm active:scale-95 transition-all text-xl hover:bg-slate-50" onclick="calcAction('.')">.</button>
            </div>
            
            <button type="button" onclick="useCalcValue()" class="w-full bg-[#16A34A] hover:bg-[#15803D] text-white font-semibold py-3.5 rounded-2xl transition-all shadow-[0_4px_15px_rgba(22,163,74,0.25)] active:scale-[0.98] flex justify-center items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                Use in Bill
            </button>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 p-4 bg-gradient-to-t from-[#F8FAFC] via-[#F8FAFC] to-transparent pb-6 flex justify-center z-40">
        <button onclick="shareToGroup()" class="w-full max-w-md bg-[#16A34A] hover:bg-[#15803D] text-white font-semibold py-4 px-4 rounded-2xl shadow-[0_6px_20px_rgba(22,163,74,0.25)] transition-all active:scale-[0.98] flex items-center justify-center gap-2 text-[15px]">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
            Send Bill via WhatsApp
        </button>
    </div>

    <!-- Custom Toast -->
    <div id="toast">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
        <span id="toast-msg">Success!</span>
    </div>

    <script>
        const friends = ["Omm", "Satyapragnya", "Biswaranjan", "Neeraj"];
        const fullNames = { 
            "Omm": "Omm Sairam Mahanta", 
            "Satyapragnya": "Satyapragnya Samal", 
            "Biswaranjan": "Biswaranjan Sahoo", 
            "Neeraj": "Neeraj Behera" 
        };
        let expenses = [];

        document.getElementById('add-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const desc = document.getElementById('desc').value;
            const amount = parseFloat(document.getElementById('amt').value);
            const payer = document.getElementById('payer').value;

            expenses.push({ id: Date.now(), desc, amount, payer });
            
            document.getElementById('desc').value = '';
            document.getElementById('amt').value = '';
            document.getElementById('desc').focus();
            
            processData();
        });

        function deleteExpense(id) {
            expenses = expenses.filter(e => e.id !== id);
            processData();
        }

        function processData() {
            let total = 0;
            let paidMap = { "Omm": 0, "Satyapragnya": 0, "Biswaranjan": 0, "Neeraj": 0 };
            
            expenses.forEach(exp => {
                total += exp.amount;
                paidMap[exp.payer] += exp.amount;
            });

            const perHead = total / 4;
            let debtors = [];
            let creditors = [];

            friends.forEach(f => {
                let net = paidMap[f] - perHead;
                if(net < -0.01) debtors.push({ name: f, amount: Math.abs(net) });
                else if(net > 0.01) creditors.push({ name: f, amount: net });
            });

            debtors.sort((a,b) => b.amount - a.amount);
            creditors.sort((a,b) => b.amount - a.amount);

            let settlements = [];
            let i = 0, j = 0;

            while(i < debtors.length && j < creditors.length) {
                let transfer = Math.min(debtors[i].amount, creditors[j].amount);
                if(transfer > 0.01) {
                    settlements.push({
                        from: debtors[i].name,
                        to: creditors[j].name,
                        amount: Math.round(transfer)
                    });
                }
                debtors[i].amount -= transfer;
                creditors[j].amount -= transfer;
                
                if(debtors[i].amount < 0.01) i++;
                if(creditors[j].amount < 0.01) j++;
            }

            renderUI(total, perHead, settlements);
        }

        function renderUI(total, perHead, settlements) {
            document.getElementById('ui-total').innerText = `₹${Math.round(total)}`;
            
            const setEl = document.getElementById('ui-settlements');
            if(expenses.length === 0) {
                setEl.innerHTML = '<p class="text-center text-sm text-slate-400 py-3 font-light">Awaiting first transaction...</p>';
            } else if (settlements.length === 0) {
                setEl.innerHTML = '<div class="flex items-center justify-center gap-2 text-[#16A34A] font-medium py-3 bg-[#16A34A]/10 rounded-xl border border-[#16A34A]/20">All settled up!</div>';
            } else {
                setEl.innerHTML = settlements.map(s => `
                    <div class="flex items-center justify-between text-sm expense-card-enter bg-white p-3 rounded-xl border border-slate-200 shadow-sm">
                        <div class="flex items-center gap-2.5">
                            <span class="font-medium text-[#DC2626]">${s.from}</span>
                            <span class="text-slate-400 text-xs">-></span>
                            <span class="font-medium text-[#16A34A]">${s.to}</span>
                        </div>
                        <span class="font-bold text-[#2563EB] bg-[#2563EB]/10 px-2.5 py-1 rounded-lg">₹${s.amount}</span>
                    </div>
                `).join('');
            }

            const histEl = document.getElementById('ui-history');
            histEl.innerHTML = expenses.slice().reverse().map(e => `
                <div class="flex justify-between items-center py-3 border-b border-slate-100 last:border-0 group">
                    <div>
                        <p class="text-sm font-medium text-slate-700">${e.desc}</p>
                        <p class="text-[10px] text-slate-400 uppercase tracking-wider mt-0.5">Paid by <span class="text-[#4F46E5] font-semibold">${e.payer}</span></p>
                    </div>
                    <div class="flex items-center gap-3">
                        <span class="text-sm font-semibold text-slate-800">₹${e.amount}</span>
                        <button onclick="deleteExpense(${e.id})" class="text-slate-300 hover:text-[#DC2626] transition-colors p-1">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function shareToGroup() {
            if(expenses.length === 0) {
                showToast("Add an expense first!", "#DC2626"); 
                return;
            }

            let total = 0;
            expenses.forEach(e => total += e.amount);
            let perHead = total / 4;
            
            // Premium structured format based on user request (Emojis Removed)
            let message = `ASTRASPLIT • Trip Summary\n`;
            message += `━━━━━━━━━━━━━━━━━━\n`;
            message += `Total Spent: ₹${Math.round(total)}\n`;
            message += `Split Between: 4 Members\n`;
            message += `Per Person: ₹${Math.round(perHead)}\n`;
            message += `━━━━━━━━━━━━━━━━━━\n`;
            message += `Expenses Recorded\n`;

            expenses.forEach((e) => {
                message += `• ${e.desc} — ₹${e.amount}\n`;
                message += `Paid by: ${e.payer}\n`;
            });

            message += `━━━━━━━━━━━━━━━━━━\n`;
            message += `Final Settlement\n`;
            
            let paidMap = { "Omm": 0, "Satyapragnya": 0, "Biswaranjan": 0, "Neeraj": 0 };
            expenses.forEach(exp => paidMap[exp.payer] += exp.amount);
            
            let debtors = [], creditors = [];
            friends.forEach(f => {
                let net = paidMap[f] - perHead;
                if(net < -0.01) debtors.push({ name: f, amount: Math.abs(net) });
                else if(net > 0.01) creditors.push({ name: f, amount: net });
            });
            
            debtors.sort((a,b) => b.amount - a.amount);
            creditors.sort((a,b) => b.amount - a.amount);
            
            let settlementCount = 0;
            let i = 0, j = 0;
            
            while(i < debtors.length && j < creditors.length) {
                let t = Math.min(debtors[i].amount, creditors[j].amount);
                if(t > 0.01) {
                    message += `• ${debtors[i].name} -> ₹${Math.round(t)} to ${creditors[j].name}\n`;
                    settlementCount++;
                }
                debtors[i].amount -= t;
                creditors[j].amount -= t;
                if(debtors[i].amount < 0.01) i++;
                if(creditors[j].amount < 0.01) j++;
            }

            if(settlementCount === 0) {
                message += `All settled up!\n`;
            }
            
            message += `━━━━━━━━━━━━━━━━━━\n`;
            message += `Settlement Optimized\n`;
            message += `Powered by ASTRASPLIT`;

            // Final bulletproof encoding of the single string
            const encodedMessage = encodeURIComponent(message);
            
            showToast("Opening WhatsApp...", "#16A34A"); 
            
            // wa.me is the most stable protocol for both Web and Mobile apps
            const whatsappURL = `https://wa.me/?text=${encodedMessage}`;
            
            const link = document.createElement('a');
            link.href = whatsappURL;
            link.target = '_blank';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function showToast(text, color) {
            const toast = document.getElementById("toast");
            const msg = document.getElementById("toast-msg");
            
            toast.style.borderColor = color;
            toast.style.color = color;
            toast.style.boxShadow = `0 10px 25px -5px ${color}33`;
            
            msg.innerText = text;
            
            toast.classList.add("show");
            setTimeout(() => {
                toast.classList.remove("show");
            }, 3000);
        }

        let calcExpression = '';

        function openCalc() {
            const modal = document.getElementById('calc-modal');
            const container = document.getElementById('calc-container');
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modal.classList.add('opacity-100');
                container.classList.remove('scale-95');
                container.classList.add('scale-100');
            }, 10);
        }

        function closeCalc() {
            const modal = document.getElementById('calc-modal');
            const container = document.getElementById('calc-container');
            modal.classList.remove('opacity-100');
            modal.classList.add('opacity-0');
            container.classList.remove('scale-100');
            container.classList.add('scale-95');
            setTimeout(() => { modal.classList.add('hidden'); }, 300);
        }

        function calcAction(val) {
            if(calcExpression === 'Error') calcExpression = '';

            if (val === 'C') {
                calcExpression = '';
            } else if (val === 'del') {
                calcExpression = calcExpression.slice(0, -1);
            } else if (val === '=') {
                try {
                    let expr = calcExpression.replace(/×/g, '*').replace(/÷/g, '/');
                    let result = Function('"use strict";return (' + expr + ')')();
                    if (result === Infinity || isNaN(result)) throw new Error('Invalid');
                    calcExpression = (Math.round(result * 100) / 100).toString();
                } catch(e) {
                    calcExpression = 'Error';
                }
            } else {
                const lastChar = calcExpression.slice(-1);
                const operators = ['+', '-', '×', '÷'];
                if (operators.includes(val) && operators.includes(lastChar)) {
                    calcExpression = calcExpression.slice(0, -1) + val;
                } else {
                    calcExpression += val;
                }
            }

            document.getElementById('calc-screen').innerText = calcExpression === '' ? '0' : calcExpression;
        }

        function useCalcValue() {
            if(calcExpression !== '' && calcExpression !== 'Error') {
                calcAction('=');
                let finalVal = parseFloat(calcExpression);
                if(!isNaN(finalVal) && finalVal > 0) {
                    const amtInput = document.getElementById('amt');
                    amtInput.value = finalVal;
                    amtInput.focus();
                }
            }
            closeCalc();
        }


        processData();
    </script>
</body>
</html>
